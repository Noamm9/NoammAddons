name: Validate JSON

on:
  push:
    branches: [data]
  pull_request:
    branches: [data]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          python3 - <<'EOF'
          import json
          import pathlib
          import sys
          import unicodedata

          failed = False

          # Invisible / lookalike characters (by codepoint) that are valid JSON but
          # break string matching in-game, and are impossible to spot in a diff.
          SNEAKY = {
              0x00A0: "no-break space (NBSP)",
              0x00AD: "soft hyphen",
              0x200B: "zero-width space",
              0x200C: "zero-width non-joiner",
              0x200D: "zero-width joiner",
              0x200E: "left-to-right mark",
              0x200F: "right-to-left mark",
              0x2028: "line separator",
              0x2029: "paragraph separator",
              0x202F: "narrow no-break space",
              0x2060: "word joiner",
              0x3000: "ideographic space",
              0xFEFF: "zero-width no-break space (BOM)",
          }

          def describe(ch):
              return SNEAKY.get(ord(ch)) or unicodedata.name(ch, "unnamed")

          def is_sneaky(ch):
              if ord(ch) in SNEAKY:
                  return True
              cat = unicodedata.category(ch)
              # Cf = invisible format chars, Zs = any space that isn't a normal one,
              # Cc = control chars other than \n (tab included: invisible and never
              # legitimate inside these data strings).
              return cat == "Cf" or (cat == "Zs" and ch != " ") or (cat == "Cc" and ch != "\n")

          def reject_duplicate_keys(pairs):
              seen = set()
              for key, _ in pairs:
                  if key in seen:
                      raise ValueError(f"duplicate key {key!r}")
                  seen.add(key)
              return dict(pairs)

          for path in sorted(pathlib.Path(".").rglob("*.json")):
              if ".git" in path.parts:
                  continue
              errors = []
              try:
                  raw = path.read_bytes()
                  if raw.startswith(b"\xef\xbb\xbf"):
                      errors.append("file starts with a UTF-8 BOM")
                      raw = raw[3:]
                  if b"\r" in raw:
                      errors.append("file contains CRLF / CR line endings (use LF)")
                      raw = raw.replace(b"\r\n", b"\n").replace(b"\r", b"\n")
                  text = raw.decode("utf-8")

                  for lineno, line in enumerate(text.split("\n"), start=1):
                      for col, ch in enumerate(line, start=1):
                          if is_sneaky(ch):
                              errors.append(f"line {lineno}, col {col}: invisible character U+{ord(ch):04X} ({describe(ch)})")
                      if line != line.rstrip():
                          errors.append(f"line {lineno}: trailing whitespace")

                  json.loads(text, object_pairs_hook=reject_duplicate_keys)
              except Exception as e:
                  errors.append(str(e))

              if errors:
                  failed = True
                  print(f"FAIL  {path}")
                  for err in errors:
                      print(f"      {err}")
              else:
                  print(f"OK    {path}")

          if failed:
              sys.exit(1)
          EOF
